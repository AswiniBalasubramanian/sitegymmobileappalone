<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1360"/>
<title>SITE2GYM · Mobile App Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #000; font-family: 'Inter Tight', system-ui, sans-serif; overflow: hidden; }
  #root { width: 1360px; height: 768px; position: relative; }
  *::-webkit-scrollbar { display: none; }
  @keyframes scan    { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
  @keyframes pagein  { from { opacity: 0; transform: translateY(6px) } to { opacity: 1; transform: translateY(0) } }
  @keyframes dropin  { from { transform: translateY(-20px); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
  @keyframes fadein  { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideup { from { transform: translateY(100%) } to { transform: translateY(0) } }
  @keyframes spin0   { to { transform: rotate(360deg); } }
  @keyframes spin1   { to { transform: rotate(-360deg); } }
  @keyframes spin2   { to { transform: rotate(360deg); } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ───────── tokens ─────────
const C = {
  bg: '#000',
  bg2: '#0A0B0C',
  surface: 'rgba(255,255,255,0.04)',
  surfaceHi: 'rgba(255,255,255,0.07)',
  line: 'rgba(255,255,255,0.09)',
  lineHi: 'rgba(255,255,255,0.16)',
  text: '#F5F6F7',
  textDim: 'rgba(245,246,247,0.62)',
  textMute: 'rgba(245,246,247,0.38)',
  lime: '#D0FF00',
  limeDim: 'rgba(208,255,0,0.14)',
  cyan: '#00F0FF',
  cyanDim: 'rgba(0,240,255,0.14)',
  magenta: '#FF2E88',
  amber: '#FFB020',
};

const FONT = `'Inter Tight', 'SF Pro Display', -apple-system, system-ui, sans-serif`;
const MONO = `'JetBrains Mono', ui-monospace, Menlo, monospace`;

// ───────── icons ─────────
const Ic = {
  home:  (c = '#fff', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M3 11l9-7 9 7v9a2 2 0 01-2 2h-4v-6h-6v6H5a2 2 0 01-2-2v-9z" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/></svg>,
  cal:   (c = '#fff', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="3" stroke={c} strokeWidth="1.8"/><path d="M3 10h18M8 3v4M16 3v4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>,
  key:   (c = '#fff', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="8" cy="12" r="4" stroke={c} strokeWidth="1.8"/><path d="M12 12h9M17 12v4M21 12v3" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>,
  card:  (c = '#fff', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="18" height="13" rx="2.5" stroke={c} strokeWidth="1.8"/><path d="M3 10h18M7 15h4" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>,
  user:  (c = '#fff', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke={c} strokeWidth="1.8"/><path d="M4 20c1.5-4 4.5-6 8-6s6.5 2 8 6" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></svg>,
  plus:  (c = '#000', s = 22) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 4v16M4 12h16" stroke={c} strokeWidth="2.4" strokeLinecap="round"/></svg>,
  bolt:  (c = '#fff', s = 18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" stroke={c} strokeWidth="1.6" strokeLinejoin="round" fill="none"/></svg>,
  fire:  (c = '#fff', s = 18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 3c1 3 4 4 4 8a4 4 0 11-8 0c0-1.5.5-2.5 1-3 0 2 2 3 2 0 0-2 0-3 1-5z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  clock: (c = '#fff', s = 16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={c} strokeWidth="1.6"/><path d="M12 7v5l3 2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
  pin:   (c = '#fff', s = 14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M12 22s7-7 7-12a7 7 0 10-14 0c0 5 7 12 7 12z" stroke={c} strokeWidth="1.6"/><circle cx="12" cy="10" r="2.5" stroke={c} strokeWidth="1.6"/></svg>,
  chev:  (c = '#fff', s = 14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  bell:  (c = '#fff', s = 18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 1112 0c0 5 2 7 2 7H4s2-2 2-7zM10 20a2 2 0 004 0" stroke={c} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  qr:    (c = '#fff', s = 18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" stroke={c} strokeWidth="1.6"/><rect x="14" y="3" width="7" height="7" stroke={c} strokeWidth="1.6"/><rect x="3" y="14" width="7" height="7" stroke={c} strokeWidth="1.6"/><path d="M14 14h3v3M21 14v7M14 21h3" stroke={c} strokeWidth="1.6"/></svg>,
  trophy:(c = '#fff', s = 18) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><path d="M8 4h8v5a4 4 0 11-8 0V4zM4 5h4v3a2 2 0 01-4 0V5zM16 5h4v3a2 2 0 01-4 0V5zM9 15h6v2H9zM8 19h8v2H8z" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/></svg>,
  gear:  (c = '#fff', s = 16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke={c} strokeWidth="1.6"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></svg>,
};

// ───────── iOS device frame (status bar + bezel) ─────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSDevice({ children, width = 402, height = 874, dark = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ───────── shared atoms ─────────
function GlowCard({ children, style, glow = false, onClick }) {
  return (
    <div onClick={onClick} style={{
      position: 'relative', borderRadius: 22,
      background: 'linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.02))',
      border: `1px solid ${glow ? 'rgba(208,255,0,0.35)' : C.line}`,
      boxShadow: glow ? '0 0 0 1px rgba(208,255,0,0.08), 0 24px 60px -20px rgba(208,255,0,0.25)' : 'none',
      overflow: 'hidden',
      ...style,
    }}>{children}</div>
  );
}

function Pill({ children, tone = 'lime', style }) {
  const tones = {
    lime:  { bg: 'rgba(208,255,0,0.14)', fg: C.lime, br: 'rgba(208,255,0,0.25)' },
    cyan:  { bg: 'rgba(0,240,255,0.12)', fg: C.cyan, br: 'rgba(0,240,255,0.25)' },
    white: { bg: 'rgba(255,255,255,0.06)', fg: C.text, br: C.line },
    amber: { bg: 'rgba(255,176,32,0.12)', fg: C.amber, br: 'rgba(255,176,32,0.3)' },
  };
  const t = tones[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '4px 9px', borderRadius: 999,
      background: t.bg, color: t.fg, border: `1px solid ${t.br}`,
      fontSize: 10.5, fontWeight: 600, letterSpacing: 0.4, textTransform: 'uppercase',
      fontFamily: MONO,
      ...style,
    }}>{children}</span>
  );
}

function NeonButton({ children, full, tone = 'lime', onClick, style }) {
  const bg = tone === 'lime' ? C.lime : tone === 'cyan' ? C.cyan : '#fff';
  return (
    <button onClick={onClick} style={{
      width: full ? '100%' : 'auto',
      height: 54, border: 'none',
      background: bg, color: '#000',
      borderRadius: 16, cursor: 'pointer',
      fontFamily: FONT, fontSize: 15.5, fontWeight: 700, letterSpacing: -0.2,
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      boxShadow: `0 10px 40px -10px ${bg}, inset 0 1px 0 rgba(255,255,255,0.5)`,
      transition: 'transform .15s ease, box-shadow .15s ease',
      ...style,
    }}
    onMouseDown={e => e.currentTarget.style.transform = 'scale(0.97)'}
    onMouseUp={e => e.currentTarget.style.transform = 'scale(1)'}
    onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}>
      {children}
    </button>
  );
}

function GhostButton({ children, full, onClick, style }) {
  return (
    <button onClick={onClick} style={{
      width: full ? '100%' : 'auto',
      height: 54, borderRadius: 16,
      background: 'rgba(255,255,255,0.04)', color: C.text,
      border: `1px solid ${C.lineHi}`,
      fontFamily: FONT, fontSize: 15, fontWeight: 600, letterSpacing: -0.2,
      cursor: 'pointer',
      display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
      ...style,
    }}>{children}</button>
  );
}

function NoisePane({ h = 180, label, tone = 'lime' }) {
  const accent = tone === 'lime' ? C.lime : C.cyan;
  return (
    <div style={{
      height: h, borderRadius: 20, position: 'relative', overflow: 'hidden',
      background: `
        radial-gradient(120% 100% at 10% 0%, ${accent}22, transparent 60%),
        radial-gradient(120% 100% at 100% 100%, ${C.cyan}18, transparent 60%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.03) 0 2px, transparent 2px 8px),
        #0C0E10`,
      border: `1px solid ${C.line}`,
    }}>
      {label && (
        <div style={{
          position: 'absolute', left: 12, bottom: 10,
          fontFamily: MONO, fontSize: 10, color: 'rgba(255,255,255,0.5)',
          textTransform: 'uppercase', letterSpacing: 1,
        }}>[ {label} ]</div>
      )}
    </div>
  );
}

function IconCircle({ children }) {
  return (
    <div style={{
      width: 42, height: 42, borderRadius: 21,
      background: C.surface, border: `1px solid ${C.line}`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>{children}</div>
  );
}

function SectionHead({ title, right }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 10 }}>
      <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: -0.4 }}>{title}</div>
      {right && <div style={{ fontSize: 12.5, color: C.lime, fontWeight: 500 }}>{right}</div>}
    </div>
  );
}

function Stat({ label, v }) {
  return (
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 18, fontWeight: 700, letterSpacing: -0.4 }}>{v}</div>
      <div style={{ fontSize: 11, color: C.textDim, fontFamily: MONO, letterSpacing: 0.8, textTransform: 'uppercase', marginTop: 2 }}>{label}</div>
    </div>
  );
}

function HeroMark() {
  return (
    <div style={{ width: 220, height: 220, position: 'relative' }}>
      {[0, 1, 2].map(i => (
        <div key={i} style={{
          position: 'absolute', inset: i * 22,
          borderRadius: '50%',
          border: `1px solid ${i === 0 ? C.lime : i === 1 ? 'rgba(0,240,255,0.4)' : 'rgba(255,255,255,0.1)'}`,
          boxShadow: i === 0 ? `0 0 60px ${C.lime}66, inset 0 0 30px ${C.lime}33` : 'none',
          animation: `spin${i} ${18 + i*6}s linear infinite`,
        }} />
      ))}
      <div style={{
        position: 'absolute', inset: 66,
        borderRadius: '50%',
        background: `radial-gradient(circle at 30% 30%, #fff, ${C.lime} 60%, #7c9a00)`,
        boxShadow: `0 0 80px ${C.lime}aa`,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: '#000', fontSize: 36, fontWeight: 900, fontFamily: MONO,
      }}>S2</div>
    </div>
  );
}

function XPRing({ xp }) {
  const pct = 0.72;
  const r = 38, c = 2 * Math.PI * r;
  return (
    <div style={{ width: 96, height: 96, position: 'relative' }}>
      <svg width="96" height="96" viewBox="0 0 96 96">
        <defs>
          <linearGradient id="xpg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stopColor={C.lime}/>
            <stop offset="1" stopColor={C.cyan}/>
          </linearGradient>
        </defs>
        <circle cx="48" cy="48" r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6"/>
        <circle cx="48" cy="48" r={r} fill="none" stroke="url(#xpg)" strokeWidth="6"
          strokeDasharray={`${c*pct} ${c}`} strokeLinecap="round" transform="rotate(-90 48 48)"/>
      </svg>
      <div style={{
        position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ fontSize: 20, fontWeight: 800, letterSpacing: -0.5 }}>{xp.toLocaleString()}</div>
        <div style={{ fontFamily: MONO, fontSize: 9, color: C.textMute, letterSpacing: 1 }}>XP</div>
      </div>
    </div>
  );
}

function pseudoRand(i) {
  const x = Math.sin(i * 9.7 + 3.1) * 43758.5453;
  return x - Math.floor(x);
}

// ───────── ONBOARDING ─────────
function OnboardingScreen({ step, setStep, onFinish, userType, setUserType }) {
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: C.bg, color: C.text }}>
      <div style={{
        position: 'absolute', inset: 0, pointerEvents: 'none',
        background: `
          radial-gradient(80% 50% at 20% 10%, ${C.limeDim}, transparent 60%),
          radial-gradient(60% 40% at 100% 90%, ${C.cyanDim}, transparent 60%)`,
      }} />
      <div style={{ flex: 1, position: 'relative', padding: '70px 24px 20px', display: 'flex', flexDirection: 'column' }}>
        <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{
              height: 3, flex: i === step ? 2 : 1, borderRadius: 2,
              background: i === step ? C.lime : 'rgba(255,255,255,0.15)',
              transition: 'all .3s ease',
            }} />
          ))}
        </div>

        {step === 0 && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
            <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <HeroMark />
            </div>
            <div style={{ fontFamily: MONO, fontSize: 11, color: C.textMute, letterSpacing: 2, textTransform: 'uppercase', marginBottom: 10 }}>
              SITE2GYM · v4.0
            </div>
            <div style={{ fontSize: 40, fontWeight: 700, lineHeight: 1.02, letterSpacing: -1.2, textWrap: 'balance' }}>
              Train like<br/>the <span style={{ color: C.lime }}>machine</span> knows you.
            </div>
            <div style={{ color: C.textDim, marginTop: 14, fontSize: 15, lineHeight: 1.45, maxWidth: 320 }}>
              Memberships, classes, door access and PT — all in one kit. Zero front-desk friction.
            </div>
            <div style={{ marginTop: 28 }}>
              <NeonButton full onClick={() => setStep(1)}>Get started →</NeonButton>
              <div style={{ textAlign: 'center', color: C.textDim, marginTop: 14, fontSize: 13 }}>
                Have an account? <span style={{ color: C.lime }}>Sign in</span>
              </div>
            </div>
          </div>
        )}

        {step === 1 && (
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', paddingTop: 28 }}>
            <div style={{ fontFamily: MONO, fontSize: 11, color: C.textMute, letterSpacing: 2, textTransform: 'uppercase' }}>Step 2 of 3</div>
            <div style={{ fontSize: 34, fontWeight: 700, lineHeight: 1.05, letterSpacing: -1, marginTop: 6 }}>
              How are you showing up today?
            </div>
            <div style={{ display: 'grid', gap: 12, marginTop: 26 }}>
              {[
                { id: 'member',   title: 'Member',   sub: 'Train, book, enter gyms',      accent: C.lime },
                { id: 'employee', title: 'Employee', sub: 'Ops, attendance, members',     accent: C.cyan },
              ].map(o => {
                const on = userType === o.id;
                return (
                  <div key={o.id} onClick={() => setUserType(o.id)} style={{
                    padding: 18, borderRadius: 20, cursor: 'pointer',
                    border: `1px solid ${on ? o.accent : C.line}`,
                    background: on ? `linear-gradient(180deg, ${o.accent}14, transparent)` : C.surface,
                    boxShadow: on ? `0 10px 40px -12px ${o.accent}` : 'none',
                    display: 'flex', gap: 14, alignItems: 'center',
                  }}>
                    <div style={{
                      width: 54, height: 54, borderRadius: 16,
                      background: on ? o.accent : 'rgba(255,255,255,0.06)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      color: on ? '#000' : C.text,
                    }}>
                      {o.id === 'member' ? Ic.bolt(on ? '#000' : '#fff', 22) : Ic.gear(on ? '#000' : '#fff', 20)}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 17, fontWeight: 600, letterSpacing: -0.3 }}>{o.title}</div>
                      <div style={{ color: C.textDim, fontSize: 13 }}>{o.sub}</div>
                    </div>
                    <div style={{
                      width: 22, height: 22, borderRadius: 11,
                      border: `1.5px solid ${on ? o.accent : C.lineHi}`,
                      background: on ? o.accent : 'transparent',
                    }} />
                  </div>
                );
              })}
            </div>
            <div style={{ flex: 1 }} />
            <NeonButton full onClick={() => setStep(2)}>Continue</NeonButton>

// ───────── TOAST ─────────
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div data-toast style={{
      position: 'absolute', top: 80, left: 20, right: 20, zIndex: 60,
      padding: 14, borderRadius: 16,
      background: 'rgba(16,17,18,0.92)',

    }}>
      <div style={{ width: 24, height: 24, borderRadius: 12, background: C.lime, color: '#000', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>✓</div>

// ───────── MAIN APP ─────────
function App() {
  const [booted, setBooted] = useState(() => localStorage.getItem('s2g_booted') === '1');
  const [step, setStep] = useState(0);
  const [userType, setUserType] = useState('member');
  const [tab, setTab] = useState('home');
  const [fab, setFab] = useState(false);
  const [scanning, setScanning] = useState(false);
  const [scanned, setScanned] = useState(false);
  const [toast, setToast] = useState(null);
  const [xp, setXp] = useState(4290);
  const [streak, setStreak] = useState(5);

  useEffect(() => {
    if (booted) localStorage.setItem('s2g_booted', '1');
  }, [booted]);

  const toastIt = (m) => {
    setToast(m);
    setTimeout(() => setToast(null), 2200);
  };

  const onScan = () => {
    setScanning(true);
    setTimeout(() => {
      setScanning(false);
      setScanned(true);
      toastIt('Entry granted · +10 XP');
      setXp(x => x + 10);
    }, 1800);
  };

  const onBooked = (s) => {
    setFab(false);
    const amt = s?.xp || 50;
    toastIt(`Booked · ${s?.t || 'Class'} · +${amt} XP`);
    setXp(x => x + amt);
  };

  const onEnterGym = () => setTab('access');

  if (!booted) {
    return (
      <OnboardingScreen
        step={step} setStep={setStep}
        userType={userType} setUserType={setUserType}
        onFinish={() => setBooted(true)}
      />
    );
  }

  return (
    <div style={{ height: '100%', position: 'relative', background: C.bg, overflow: 'hidden' }}>
      <Toast msg={toast} />
      <div style={{ height: '100%', overflowY: 'auto' }} key={tab}>
        <div style={{ animation: 'pagein .28s cubic-bezier(.2,.8,.2,1)' }}>
          {tab === 'home'       && <HomeScreen onEnter={onEnterGym} onNav={setTab} streak={streak} xp={xp} />}
          {tab === 'booking'    && <BookingScreen onBooked={onBooked} />}
          {tab === 'access'     && <AccessScreen scanning={scanning} scanned={scanned} onScan={onScan} onReset={() => setScanned(false)} />}
          {tab === 'membership' && <MembershipScreen />}
          {tab === 'profile'    && <ProfileScreen streak={streak} xp={xp} />}
        </div>
      </div>
      <BottomNav tab={tab} onTab={setTab} onFab={() => setFab(true)} />
      <FabSheet open={fab} onClose={() => setFab(false)} onBooked={onBooked} />
    </div>
  );
}
